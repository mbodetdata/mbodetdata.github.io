<!-- Modal projet : DOIT exister dans le DOM (id + IDs internes) -->
<div id="project-modal" class="modal modal--project" hidden>
  <div class="modal__overlay" data-close="true"></div>

  <div class="modal__dialog proj-modal" role="dialog" aria-modal="true" aria-labelledby="project-title">

    <!-- Bouton fermer -->
    <button class="proj-modal__close" type="button" data-close="true" aria-label="Fermer">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>

    <!-- En-tête -->
    <div class="proj-modal__header">
      <p class="proj-modal__eyebrow">
        <span class="proj-modal__eyebrow-dot" aria-hidden="true"></span>
        &Eacute;tude de cas
      </p>
      <p class="proj-modal__client" id="project-client"></p>
      <h2 class="proj-modal__title" id="project-title"></h2>
      <p class="proj-modal__abstract" id="project-abstract"></p>
    </div>

    <!-- Corps (scrollable) -->
    <div class="proj-modal__body">

      <!-- Contexte synthétique -->
      <div class="proj-modal__block proj-modal__block--ctx">
        <h3 class="proj-modal__block-title">
          <svg class="proj-modal__block-ico" viewBox="0 0 20 20" width="16" height="16" fill="none" aria-hidden="true">
            <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.5"/>
            <path d="M10 9v5M10 7h.01" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          Contexte synth&eacute;tique
        </h3>
        <p id="project-contexte" class="proj-modal__ctx-text"></p>
      </div>

      <!-- Solution apportée (orientée client + bénéfice) -->
      <div class="proj-modal__block proj-modal__block--missions">
        <h3 class="proj-modal__block-title">
          <svg class="proj-modal__block-ico" viewBox="0 0 20 20" width="16" height="16" fill="none" aria-hidden="true">
            <path d="M4 6h12M4 10h8M4 14h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Solution apport&eacute;e
        </h3>
        <ul id="project-solution" class="proj-modal__list proj-modal__list--missions"></ul>
      </div>

      <!-- Stack technique -->
      <div class="proj-modal__block proj-modal__block--stack">
        <h3 class="proj-modal__block-title">
          <svg class="proj-modal__block-ico" viewBox="0 0 20 20" width="16" height="16" fill="none" aria-hidden="true">
            <rect x="3" y="3" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <rect x="11" y="3" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <rect x="3" y="11" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <rect x="11" y="11" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          Stack technique
        </h3>
        <ul id="project-stack" class="proj-modal__stack stack-list"></ul>
      </div>

    </div><!-- /proj-modal__body -->

    <!-- Pied de page -->
    <footer class="proj-modal__footer">
      <button class="proj-modal__btn-close" type="button" data-close="true">Fermer</button>
      <a class="btn btn--gradient proj-modal__btn-link" id="project-link" href="#" target="_blank" rel="noopener noreferrer">
        Voir le projet
        <svg viewBox="0 0 20 20" width="13" height="13" fill="none" aria-hidden="true">
          <path d="M7 10h6M10 7l3 3-3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </footer>

  </div><!-- /proj-modal -->
</div><!-- /#project-modal -->
